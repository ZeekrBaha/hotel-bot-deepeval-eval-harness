name: tests
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - run: uv sync --frozen          # install from uv.lock exactly
      - run: uv run ruff check .        # lint gate
      - run: uv run mypy .              # type-check gate (gradual baseline)
      - run: uv run pytest tests -q     # only offline tests; evals/ skip without keys
