name: live-eval

# Scheduled live evaluation: runs the real SUT + DeepSeek judge against the
# synthetic suite, uploads the JSON/Markdown reports as artifacts, and gates ONLY
# on the stable deterministic signal (the payment-leak safety gate) plus an infra
# error-rate floor. Flaky judge/grounding scores are reported but never block.
on:
  schedule:
    - cron: "0 6 * * 1"          # every Monday 06:00 UTC
  workflow_dispatch:
    inputs:
      limit:
        description: "Number of synthetic cases to run"
        required: false
        default: "200"

jobs:
  live-eval:
    runs-on: ubuntu-latest
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}      # drives the SUT (gpt-4o-mini)
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}  # drives the LLM judge
      SYSTEM_PROMPT_PATH: data/system_prompt.txt         # pin SUT to known ground-truth
      LIMIT: ${{ github.event.inputs.limit || '200' }}
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - run: uv sync --frozen

      - name: Run live suite (synth)
        run: uv run python -m evals.run_suite --source synth --limit "$LIMIT"

      - name: Upload reports
        if: always()                                     # keep artifacts even on gate fail
        uses: actions/upload-artifact@v4
        with:
          name: suite-report-synth
          path: |
            results/suite_report_synth.json
            results/suite_report_synth.md
          if-no-files-found: error

      - name: Gate on deterministic thresholds
        run: |
          uv run python - <<'PY'
          import json, sys
          from pathlib import Path
          from meta.gate import (check_payment_gate, check_grounding_gate,
                                  check_error_rate, GROUNDING_BASELINE, GROUNDING_TOLERANCE)

          report = json.loads(Path("results/suite_report_synth.json").read_text())
          summary = report["summary"]
          by_metric = summary.get("by_metric", {})

          failures = []
          failures += check_payment_gate(by_metric)
          failures += check_grounding_gate(by_metric)
          failures += check_error_rate(report["errors"], report["cases_run"] or 1)

          # Print non-gated metrics for trend monitoring
          lang = by_metric.get("language_fidelity", {})
          grounding = by_metric.get("grounding", {})
          threshold = GROUNDING_BASELINE - GROUNDING_TOLERANCE
          print(f"language_fidelity pass_rate={lang.get('pass_rate')} "
                f"CI [{lang.get('ci_low')}, {lang.get('ci_high')}] (not gated)")
          print(f"grounding pass_rate={grounding.get('pass_rate')} "
                f"CI [{grounding.get('ci_low')}, {grounding.get('ci_high')}] "
                f"(ratchet gate ≥{threshold:.3f}: baseline={GROUNDING_BASELINE} - tol={GROUNDING_TOLERANCE})")
          print(f"judge_error_rate={report.get('judge_error_rate', 'N/A')}")

          if failures:
              print("GATE FAILED:")
              for f in failures:
                  print(f"  - {f}")
              sys.exit(1)
          print("GATE PASSED: payment 1.000, grounding within ratchet, error rate OK")
          PY
