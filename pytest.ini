[pytest]
testpaths = tests evals
python_files = test_*.py
# -p no:rerunfailures: this project does not use flaky-test reruns, and autoloading
# the rerunfailures plugin can fail at startup when a foreign venv's broken copy is
# discovered on the path. Blocking it is a no-op when the plugin is absent (e.g. CI)
# and keeps the other plugins (asyncio, mock) loading normally — unlike the heavier
# PYTEST_DISABLE_PLUGIN_AUTOLOAD=1, which would disable those too.
addopts = -q -p no:rerunfailures
# pytest-asyncio (pulled in transitively by deepeval) warns when this is unset.
# Pin it to the current default so the warning is silenced and behaviour is stable.
asyncio_default_fixture_loop_scope = function
